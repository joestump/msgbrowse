name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: gofmt + vet + tests
    runs-on: ubuntu-latest
    # The SQLite driver is pure-Go (modernc.org/sqlite), so the build needs no C
    # toolchain. Pin CGO off so CI proves the binary stays cgo-free.
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # make check runs gofmt -l, go vet, and go test — no build tag needed.
      - name: make check
        run: make check

      - name: Build binary
        run: make build

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t msgbrowse:ci .
