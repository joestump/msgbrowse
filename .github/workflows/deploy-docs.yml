# Build and publish the Docusaurus docs site (docs-site/) to GitHub Pages.
# Deploys on every push to main that touches the site or the architecture
# sources it renders (ADRs / OpenSpec specs). The Pages site is configured
# with build_type=workflow, so this workflow is the only publisher.
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "docs/adr/**"
      - "docs/openspec/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
