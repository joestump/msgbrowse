# Desktop packaging matrix — SPEC-0010 "Release packaging via CI matrix",
# ADR-0017. Webview shells cannot be cross-compiled, so each OS builds its own
# artifact on its own runner. These jobs are release-scoped and MUST NOT gate
# the core CGO_ENABLED=0 check in ci.yml: they run only on v* tags, manual
# dispatch, and PRs that touch the desktop shell or this workflow — never on
# every PR. Tag-build artifacts are uploaded so the SPEC-0012 release pipeline
# can attach or reference them on GitHub Releases.
#
# Artifacts are UNSIGNED in v1: macOS code signing and notarization are
# deferred per ADR-0017 (users right-click → Open on first launch). When a
# signing identity lands, add codesign + notarytool steps to the darwin job.
#
# Windows is deliberately skipped in this pass (the spec lists a Windows
# runner; the .exe is optional per issue #102) — follow-up tracked in #119.
# Adding it later is one more matrix leg: windows-latest, `wails build
# -platform windows/amd64`, WebView2 bootstrapped by the wails runtime.

name: Desktop

on:
  pull_request:
    # Desktop-shell changes prove the matrix on their own PR checks; anything
    # else (docs, core Go, CSS) never schedules these jobs.
    paths:
      - "cmd/msgbrowse-desktop/**"
      - ".github/workflows/desktop.yml"
  push:
    tags: ["v*"]
  # Manual dry-run: produce all matrix artifacts from any ref without tagging.
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  # Wails CLI pin — keep in lockstep with the wails/v2 library version in
  # cmd/msgbrowse-desktop/go.mod.
  WAILS_VERSION: "v2.12.0"

jobs:
  darwin:
    name: macOS .app (darwin/universal)
    runs-on: macos-latest
    # macOS runners ship Xcode CLT and WKWebView is a system framework — no
    # package installs here (no apt on darwin; GTK/WebKit2GTK are Linux-only).
    defaults:
      run:
        # The desktop shell is a nested Go module (its own go.mod with
        # `replace github.com/joestump/msgbrowse => ../..`); everything runs
        # from inside it.
        working-directory: cmd/msgbrowse-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            cmd/msgbrowse-desktop/go.sum

      - name: Install Wails CLI (pinned)
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Headless module tests (pure Go)
        run: CGO_ENABLED=0 go test ./...

      # -s: no JS frontend to build (the shell serves a Go trampoline, then
      #     loopback HTTP to internal/web); -skipbindings: no bound structs;
      # -m/-nosyncgomod: never rewrite the module files in CI.
      - name: wails build (darwin/universal)
        run: wails build -platform darwin/universal -m -nosyncgomod -skipbindings -s -clean

      # ditto preserves the bundle's permissions and structure; zipping before
      # upload also keeps them through actions/upload-artifact's own zip.
      - name: Zip the .app bundle
        run: ditto -c -k --keepParent build/bin/msgbrowse-desktop.app msgbrowse-desktop_darwin_universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: msgbrowse-desktop_darwin_universal
          path: cmd/msgbrowse-desktop/msgbrowse-desktop_darwin_universal.zip
          retention-days: 30
          if-no-files-found: error

  linux:
    name: Linux binary (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Wails on Linux links the system webview; ubuntu-latest (24.04) ships
      # webkit2gtk-4.1, matched by the `webkit2_41` tag in `make desktop-linux`.
      - name: Install GTK3 + WebKit2GTK dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            cmd/msgbrowse-desktop/go.sum

      - name: Headless module tests (pure Go)
        run: make desktop-test

      - name: Build Linux desktop binary
        run: make desktop-linux

      - uses: actions/upload-artifact@v4
        with:
          name: msgbrowse-desktop_linux_amd64
          path: bin/msgbrowse-desktop
          retention-days: 30
          if-no-files-found: error
